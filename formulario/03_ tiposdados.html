><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de usuário</title>
</head>

<body>
    <form action="03_tiposdados.php" method="POST" enctype="multipart/form-data">
        
        <fieldset>
            <legend>Dados de Identificação</legend>
            
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo">

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha">

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">

        </fieldset>    

        
        <fieldset>
            <legend>Contato e Preferências</legend>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone">

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="16" max="100">

            <label for="satisfacao">Nível de interesse no curso (0 a 10):</label>
            <input type="range" id="satisfacao" name="satisfacao" min="0" max="10">

            <label for="cor">Cor favorita para o crachá:</label>
            <input type="color" id="cor" name="cor_cracha">
        </fieldset>

        <fieldset>
            <legend>Planejamento Acadêmico</legend>

            <label for="data_nasc">Data de Nascimento:</label>
            <input type="date" id="data_nasc" name="data_nasc">

            <label for="hora_aula">Horário Preferencial:</label>
            <input type="time" id="hora_aula" name="hora_aula">

            <label for="aula_extra">Agendar Aula Particular (Data e Hora):</label>
            <input type="datetime-local" id="aula_extra" name="aula_extra">

            <label for="mes_inicio">Mês de Início:</label>
            <input type="month" id="mes_inicio" name="mes_inicio">

            <label for="semana_estagio">Semana do Estágio:</label>
            <input type="week" id="semana_estagio" name="semana_estagio">
        </fieldset>

        <fieldset>
            <legend>Seleções e Documentos</legend>

            <p>Gênero:</p>
            <input type="radio" id="masc" name="genero" value="M"> <label for="masc">Masculino</label>
            <input type="radio" id="fem" name="genero" value="F"> <label for="fem">Feminino</label>

            <p>Interesses:</p>
            <input type="checkbox" id="ti" name="interesses[]" value="TI"> <label for="ti">TI</label>
            <input type="checkbox" id="adm" name="interesses[]" value="ADM"> <label for="adm">Adm</label>

            <br><br>
            <label for="arquivo">Upload de Documento:</label>
            <input type="file" id="arquivo" name="documento">
        </fieldset>

        <fieldset>
            <legend>Ações</legend>
            <input type="submit" value="Enviar Dados">
            <input type="reset" value="Limpar Tudo">
            <input type="button" value="Botão Simples" onclick="alert('Funciona!')">
            
            <label>Enviar por ícone:</label>
            <input type="image" src="https://via.placeholder.com/30" alt="Enviar" title="Botão de imagem">
        </fieldset>

    </form>
</body>

</html>
